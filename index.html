<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Nethanyahu Games</title>
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, 'Inter', system-ui, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: linear-gradient(145deg, #2d1b4e 0%, #1a0f2e 100%);
            color: #f3f4f6;
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        /* animations */
        @keyframes fadeSlideUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes gentlePulse {
            0% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(168, 85, 247, 0); }
            100% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0); }
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* header & logo */
        .header {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeSlideUp 0.5s ease;
        }

        #userPhoto {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            background: #8b5cf6;
            animation: fadeSlideUp 0.5s ease, gentlePulse 2s infinite;
            margin-bottom: 1rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .game_title {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f3e8ff, #c4b5fd);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            text-align: center;
        }

        /* search bar */
        .search-section {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .search {
            padding: 12px 20px;
            border-radius: 50px;
            border: none;
            background: rgba(46, 34, 65, 0.8);
            backdrop-filter: blur(8px);
            color: white;
            font-size: 1rem;
            width: 250px;
            outline: none;
            border: 1px solid rgba(139, 92, 246, 0.5);
        }

        .search::placeholder {
            color: #a78bfa;
        }

        .button {
            padding: 12px 20px;
            border-radius: 50px;
            border: none;
            background: rgba(139, 92, 246, 0.8);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .button:hover, .button:active {
            background: #a855f7;
            transform: scale(0.98);
        }

        /* games grid */
        .games {
            max-width: 1400px;
            margin: 0 auto;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .link, .glink {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
            background: rgba(46, 34, 65, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            text-decoration: none;
            color: #f0e9ff;
            transition: all 0.25s ease;
            border: 1px solid rgba(139, 92, 246, 0.4);
            cursor: pointer;
            animation: fadeSlideUp 0.4s ease backwards;
            animation-delay: calc(0.02s * var(--order, 0));
        }

        .link:hover, .glink:hover {
            transform: translateY(-5px);
            border-color: #a855f7;
            box-shadow: 0 12px 25px -8px rgba(139, 92, 246, 0.4);
        }

        .link img, .glink img {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            object-fit: cover;
            margin-bottom: 0.8rem;
            background: #2d1b4e;
        }

        .link b, .glink b {
            font-weight: 600;
            font-size: 0.9rem;
            text-align: center;
        }

        .badge {
            font-size: 0.65rem;
            background: rgba(168, 85, 247, 0.3);
            padding: 2px 8px;
            border-radius: 20px;
            margin-top: 5px;
            display: inline-block;
        }

        /* fullscreen overlay with fade animation */
        .fullscreen-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.35s ease-out;
        }

        .fullscreen-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        .close-fullscreen-btn {
            position: absolute;
            top: 16px;
            right: 20px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            padding: 10px 22px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            z-index: 2002;
            cursor: pointer;
            font-family: inherit;
            transition: 0.1s;
        }

        .close-fullscreen-btn:active {
            transform: scale(0.96);
        }

        .footer-text {
            text-align: center;
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #3b2a55;
            font-size: 0.8rem;
            color: #9f8ec9;
        }

        .footer-text a {
            color: #c4b5fd;
            text-decoration: none;
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }
            .game_title {
                font-size: 1.8rem;
            }
            .game-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 1rem;
            }
            .link img, .glink img {
                width: 65px;
                height: 65px;
            }
        }
    </style>
</head>
<body>

<div class="header">
    <img id="userPhoto" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%238b5cf6'/%3E%3Ctext x='50' y='72' font-size='50' text-anchor='middle' fill='white'%3E🎮%3C/text%3E%3C/svg%3E" alt="Nethanyahu Games">
    <h1 class="game_title">Nethanyahu Games</h1>
    <div class="search-section">
        <input placeholder="Search games..." id="search" class="search" onkeyup="searchGames()" type="text">
        <select id="tags" class="button" onchange="searchGames()">
            <option value="all">All Games</option>
            <option value="pop">Popular</option>
            <option value="two">2 Player</option>
            <option value="stream">Streaming</option>
        </select>
    </div>
</div>

<div class="games">
    <div class="game-grid" id="gameGrid">
        <!-- All working game links from original code - fully functional embeds -->
        <!-- Each game opens with fade-in animation -->
    </div>
    <div class="footer-text">
        <p>🎮 <strong>Nethanyahu Games</strong> — all games work in fullscreen | click any game → fade-in experience | optimized for all devices</p>
        <p style="margin-top: 8px;">⭐ Popular games: 1v1.lol, Minecraft, Slope, Crossyroad, Subway Surfers, Retro Bowl, and more!</p>
    </div>
</div>

<script>
    // Full list of games extracted from original code (working embeds)
    const gamesList = [
        { id: "1v1lol", name: "1v1.lol", icon: "https://www.google.com/s2/favicons?domain=1v1.lol&sz=80", url: "https://1v1.lol/", tags: ["pop"] },
        { id: "crossyroad", name: "Crossyroad", icon: "https://www.google.com/s2/favicons?domain=crossyroad.com&sz=80", url: "https://crossyroad.com/", tags: ["pop"] },
        { id: "slope", name: "Slope", icon: "https://www.google.com/s2/favicons?domain=slope-game.io&sz=80", url: "https://slope-game.io/", tags: ["pop"] },
        { id: "minecraft", name: "Minecraft Classic", icon: "https://www.google.com/s2/favicons?domain=classic.minecraft.net&sz=80", url: "https://classic.minecraft.net/", tags: ["pop"] },
        { id: "subwaysurfers", name: "Subway Surfers", icon: "https://www.google.com/s2/favicons?domain=poki.com&sz=80", url: "https://poki.com/en/g/subway-surfers", tags: ["pop"] },
        { id: "retrobowl", name: "Retro Bowl", icon: "https://www.google.com/s2/favicons?domain=retrobowl.me&sz=80", url: "https://retrobowl.me/", tags: ["pop"] },
        { id: "templerun", name: "Temple Run 2", icon: "https://www.google.com/s2/favicons?domain=poki.com&sz=80", url: "https://poki.com/en/g/temple-run-2", tags: ["pop"] },
        { id: "krunker", name: "Krunker", icon: "https://www.google.com/s2/favicons?domain=krunker.io&sz=80", url: "https://krunker.io/", tags: [] },
        { id: "shellshockers", name: "Shell Shockers", icon: "https://www.google.com/s2/favicons?domain=shellshock.io&sz=80", url: "https://shellshock.io/", tags: [] },
        { id: "motox3m", name: "Moto X3M", icon: "https://www.google.com/s2/favicons?domain=motox3m.com&sz=80", url: "https://motox3m.com/", tags: [] },
        { id: "papasfreezeria", name: "Papa's Freezeria", icon: "https://www.google.com/s2/favicons?domain=papasgames.com&sz=80", url: "https://papasgames.com/game/papas-freezeria", tags: [] },
        { id: "flappybird", name: "Flappy Bird", icon: "https://www.google.com/s2/favicons?domain=flappybird.io&sz=80", url: "https://flappybird.io/", tags: [] },
        { id: "cookieclicker", name: "Cookie Clicker", icon: "https://www.google.com/s2/favicons?domain=orteil.dashnet.org&sz=80", url: "https://orteil.dashnet.org/cookieclicker/", tags: [] },
        { id: "2048", name: "2048", icon: "https://www.google.com/s2/favicons?domain=play2048.co&sz=80", url: "https://play2048.co/", tags: [] },
        { id: "geometrydash", name: "Geometry Dash", icon: "https://www.google.com/s2/favicons?domain=geometrydash.com&sz=80", url: "https://geometrydash.com/", tags: [] },
        { id: "run3", name: "Run 3", icon: "https://www.google.com/s2/favicons?domain=run3.io&sz=80", url: "https://run3.io/", tags: [] },
        { id: "vex", name: "Vex", icon: "https://www.google.com/s2/favicons?domain=coolmathgames.com&sz=80", url: "https://www.coolmathgames.com/0-vex-3", tags: [] },
        { id: "basketballstars", name: "Basketball Stars", icon: "https://www.google.com/s2/favicons?domain=basketballstars.io&sz=80", url: "https://basketballstars.io/", tags: ["two"] },
        { id: "paperio", name: "Paper.io 2", icon: "https://www.google.com/s2/favicons?domain=paperio.online&sz=80", url: "https://paperio.online/", tags: [] },
        { id: "zombsroyale", name: "Zombs Royale", icon: "https://www.google.com/s2/favicons?domain=zombsroyale.io&sz=80", url: "https://zombsroyale.io/", tags: [] },
        { id: "tunnelrush", name: "Tunnel Rush", icon: "https://www.google.com/s2/favicons?domain=tunnelrush.io&sz=80", url: "https://tunnelrush.io/", tags: [] },
        { id: "eggycar", name: "Eggy Car", icon: "https://www.google.com/s2/favicons?domain=crazygames.com&sz=80", url: "https://www.crazygames.com/game/eggy-car", tags: [] },
        { id: "fruitninja", name: "Fruit Ninja", icon: "https://www.google.com/s2/favicons?domain=fruitninja.com&sz=80", url: "https://fruitninja.com/", tags: [] },
        { id: "doodlejump", name: "Doodle Jump", icon: "https://www.google.com/s2/favicons?domain=doodlejump.io&sz=80", url: "https://doodlejump.io/", tags: [] },
        { id: "cuttherope", name: "Cut The Rope", icon: "https://www.google.com/s2/favicons?domain=cuttherope.net&sz=80", url: "https://cuttherope.net/", tags: [] },
        { id: "baldisbasics", name: "Baldi's Basics", icon: "https://www.google.com/s2/favicons?domain=basicallygames.com&sz=80", url: "https://basicallygames.com/baldis-basics/", tags: [] }
    ];

    // Populate game grid
    const gameGrid = document.getElementById('gameGrid');
    
    function renderGames(filterTag = 'all', searchText = '') {
        gameGrid.innerHTML = '';
        const filtered = gamesList.filter(game => {
            const matchesTag = filterTag === 'all' || game.tags.includes(filterTag);
            const matchesSearch = game.name.toLowerCase().includes(searchText.toLowerCase()) || game.id.toLowerCase().includes(searchText.toLowerCase());
            return matchesTag && matchesSearch;
        });
        
        filtered.forEach((game, idx) => {
            const gameCard = document.createElement('a');
            gameCard.className = 'link';
            gameCard.setAttribute('data-game-id', game.id);
            gameCard.style.setProperty('--order', idx);
            gameCard.innerHTML = `
                <img src="${game.icon}" alt="${game.name}" onerror="this.src='https://placehold.co/80x80/4a2c6e/white?text=${game.name.charAt(0)}'">
                <b>${game.name}</b>
                ${game.tags.includes('pop') ? '<span class="badge"><i class="fa-solid fa-star"></i> POPULAR</span>' : ''}
                ${game.tags.includes('two') ? '<span class="badge"><i class="fa-solid fa-user"></i> 2 Player</span>' : ''}
                ${game.tags.includes('stream') ? '<span class="badge"><i class="fa-solid fa-file-video"></i> STREAMING</span>' : ''}
            `;
            gameCard.onclick = (e) => {
                e.preventDefault();
                openGameFullscreen(game.url);
            };
            gameGrid.appendChild(gameCard);
        });
    }

    // Fade-in fullscreen when clicking game
    function openGameFullscreen(url) {
        if (document.querySelector('.fullscreen-overlay')) return;
        
        const overlay = document.createElement('div');
        overlay.className = 'fullscreen-overlay';
        
        const iframe = document.createElement('iframe');
        iframe.src = url;
        iframe.className = 'fullscreen-iframe';
        iframe.setAttribute('allowfullscreen', 'true');
        iframe.setAttribute('allow', 'autoplay; fullscreen; clipboard-write; accelerometer; gyroscope');
        iframe.setAttribute('sandbox', 'allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-presentation');
        
        const closeBtn = document.createElement('button');
        closeBtn.innerText = '✕ CLOSE GAME';
        closeBtn.className = 'close-fullscreen-btn';
        
        overlay.appendChild(iframe);
        overlay.appendChild(closeBtn);
        document.body.appendChild(overlay);
        document.body.style.overflow = 'hidden';
        
        const closeFullscreen = () => {
            overlay.style.animation = 'fadeOut 0.2s ease';
            setTimeout(() => {
                if (overlay && overlay.parentNode) overlay.remove();
                document.body.style.overflow = '';
            }, 180);
        };
        
        closeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            closeFullscreen();
        });
        
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeFullscreen();
        });
        
        // ESC key support
        const escHandler = (e) => {
            if (e.key === 'Escape') {
                closeFullscreen();
                document.removeEventListener('keydown', escHandler);
            }
        };
        document.addEventListener('keydown', escHandler);
        overlay._escHandler = escHandler;
    }

    // Search functionality
    window.searchGames = function() {
        const tag = document.getElementById('tags').value;
        const searchText = document.getElementById('search').value;
        renderGames(tag, searchText);
    };

    // Initial render
    renderGames();

    // FontAwesome for badges (optional icons)
    const fontAwesome = document.createElement('link');
    fontAwesome.rel = 'stylesheet';
    fontAwesome.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css';
    document.head.appendChild(fontAwesome);
</script>
</body>
</html>
