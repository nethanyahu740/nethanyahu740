<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Game Hub: Sky Rush + Frogger Frenzy (Crossy Road Knockoff)</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #1a3f2c, #0a1f1a);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Press Start 2P', monospace, system-ui;
            touch-action: manipulation;
            padding: 16px;
        }

        /* hub container */
        .game-hub {
            max-width: 1000px;
            width: 100%;
            background: #0f2a22dd;
            backdrop-filter: blur(12px);
            border-radius: 56px;
            padding: 18px 20px 25px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,200,0.2);
            border: 1px solid #f9e0a0;
        }

        /* game selector buttons */
        .game-selector {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        .game-btn {
            background: #f3b33d;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: monospace;
            padding: 12px 28px;
            border-radius: 60px;
            color: #232b1b;
            box-shadow: 0 7px 0 #8b5a2b;
            transition: 0.07s linear;
            cursor: pointer;
            letter-spacing: 1px;
        }
        .game-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #8b5a2b; }
        .game-btn.active {
            background: #ffdd88;
            box-shadow: 0 3px 0 #b96f20;
            transform: translateY(4px);
            border: 1px solid white;
        }

        .canvas-area {
            background: #00000033;
            border-radius: 32px;
            padding: 12px;
            display: flex;
            justify-content: center;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 12px 28px black;
            background-color: #2c5a3e;
            width: 100%;
            height: auto;
            cursor: pointer;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e2d26;
            margin-top: 18px;
            padding: 10px 24px;
            border-radius: 60px;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .score-card {
            background: #000000aa;
            backdrop-filter: blur(4px);
            padding: 5px 20px;
            border-radius: 40px;
            font-weight: bold;
            color: #f7ecc7;
        }
        .score-card span {
            background: #f3b33d;
            display: inline-block;
            padding: 4px 14px;
            border-radius: 32px;
            margin-left: 10px;
            color: #121f0e;
        }
        button.small-restart {
            background: #ffe1a0;
            border: none;
            font-family: monospace;
            font-weight: bold;
            font-size: 1rem;
            padding: 6px 20px;
            border-radius: 40px;
            box-shadow: 0 4px 0 #b1621a;
            transition: 0.07s linear;
        }
        button.small-restart:active { transform: translateY(2px); box-shadow: 0 1px 0 #b1621a;}

        .controls-tip {
            background: #00000077;
            backdrop-filter: blur(4px);
            padding: 6px 18px;
            border-radius: 44px;
            font-size: 0.7rem;
            color: #e9f0cf;
            text-align: center;
            margin-top: 12px;
        }
        @media (max-width: 600px) {
            .game-btn { font-size: 0.9rem; padding: 8px 18px;}
            .score-card { font-size: 0.9rem;}
        }
    </style>
</head>
<body>
<div class="game-hub">
    <div class="game-selector">
        <button class="game-btn" id="btnSkyRush">✈️ SKY RUSH</button>
        <button class="game-btn" id="btnCrossy">🐸 FROGGER FRENZY</button>
    </div>
    <div class="canvas-area">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
    </div>
    <div class="info-panel">
        <div class="score-card">🏆 SCORE <span id="scoreDisplay">0</span></div>
        <div class="score-card">⭐ BEST <span id="bestDisplay">0</span></div>
        <button class="small-restart" id="globalRestartBtn">🔄 RESTART GAME</button>
    </div>
    <div class="controls-tip" id="controlsMsg">⬅️  MOVE: MOUSE / TOUCH & DRAG  ➡️  |  Dodge & Survive!</div>
</div>

<script>
    (function(){
        // ---------- CANVAS ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const CANVAS_W = 800, CANVAS_H = 500;
        canvas.width = CANVAS_W;
        canvas.height = CANVAS_H;

        // ---------- Game state ----------
        let currentGame = "SKYRUSH";   // "SKYRUSH" or "CROSSY"
        let gameRunning = true;
        let score = 0;
        let highScore = 0;
        
        // load global highscore (shared)
        try {
            const saved = localStorage.getItem('gameHubHigh');
            if(saved && !isNaN(parseInt(saved))) highScore = parseInt(saved);
        } catch(e){}
        
        // UI elements
        const scoreSpan = document.getElementById('scoreDisplay');
        const bestSpan = document.getElementById('bestDisplay');
        const controlsMsgDiv = document.getElementById('controlsMsg');
        
        function updateUI() {
            scoreSpan.innerText = Math.floor(score);
            bestSpan.innerText = highScore;
        }
        function saveHigh() {
            if(Math.floor(score) > highScore) {
                highScore = Math.floor(score);
                updateUI();
                try{ localStorage.setItem('gameHubHigh', highScore); } catch(e){}
            }
        }
        
        // --------------------------------------------------------------
        // 1) SKY RUSH (dodge red enemies)
        // --------------------------------------------------------------
        let skyPlayerX = CANVAS_W/2 - 18;
        const SKY_PLAYER_W = 36, SKY_PLAYER_H = 36;
        let skyObstacles = [];
        let skyFrame = 0;
        let skySpawnDelay = 38;
        
        function resetSkyRush() {
            skyPlayerX = CANVAS_W/2 - SKY_PLAYER_W/2;
            skyObstacles = [];
            skyFrame = 0;
            skySpawnDelay = 38;
        }
        
        function spawnSkyObstacle() {
            let randX = Math.random() * (CANVAS_W - 34);
            skyObstacles.push({
                x: randX, y: -34, w: 34, h: 34,
                speed: 3.0 + Math.min(4.2, score / 420)
            });
        }
        
        function updateSkyRush() {
            if(!gameRunning) return;
            // dynamic spawn
            let dynDelay = Math.max(18, 38 - Math.floor(score / 280));
            if(skyFrame >= dynDelay) {
                skyFrame = 0;
                spawnSkyObstacle();
                if(score > 400 && Math.random()<0.3) spawnSkyObstacle();
            } else skyFrame++;
            
            // move obstacles
            for(let i=0; i<skyObstacles.length; i++) {
                let obs = skyObstacles[i];
                let speedBonus = Math.min(2.8, score / 500);
                obs.y += obs.speed + speedBonus * 0.4;
                // collision
                if(skyPlayerX < obs.x+obs.w && skyPlayerX+SKY_PLAYER_W > obs.x &&
                   CANVAS_H-70 < obs.y+obs.h && CANVAS_H-70+SKY_PLAYER_H > obs.y) {
                    gameRunning = false;
                    saveHigh();
                    return;
                }
            }
            // remove offscreen & add score for passing enemies
            let before = skyObstacles.length;
            skyObstacles = skyObstacles.filter(obs => obs.y < CANVAS_H + 80);
            let passed = before - skyObstacles.length;
            if(passed > 0) score += passed * 2.2;
            // survival points
            score += 0.12;
            updateUI();
            if(Math.floor(score) > highScore) { highScore = Math.floor(score); updateUI(); saveHigh(); }
        }
        
        function drawSkyRush() {
            // sky gradient
            const grad = ctx.createLinearGradient(0,0,0,CANVAS_H);
            grad.addColorStop(0,"#4aa3df");
            grad.addColorStop(1,"#b2e0fa");
            ctx.fillStyle=grad;
            ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
            // clouds
            ctx.fillStyle="#ffffffcc";
            ctx.beginPath(); ctx.ellipse(120,60,45,35,0,0,Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(620,90,55,40,0,0,Math.PI*2); ctx.fill();
            // ground
            ctx.fillStyle="#8B5A2B"; ctx.fillRect(0,CANVAS_H-28,CANVAS_W,28);
            ctx.fillStyle="#D4A373";
            for(let i=0;i<12;i++) ctx.fillRect(i*70,CANVAS_H-20,35,10);
            // enemies
            for(let obs of skyObstacles) {
                ctx.fillStyle="#e34d2b"; ctx.shadowBlur=4;
                ctx.fillRect(obs.x,obs.y,obs.w,obs.h);
                ctx.fillStyle="#FFF7E8";
                ctx.fillRect(obs.x+6,obs.y+8,7,8); ctx.fillRect(obs.x+obs.w-13,obs.y+8,7,8);
                ctx.fillStyle="#020202";
                ctx.fillRect(obs.x+7,obs.y+9,4,5); ctx.fillRect(obs.x+obs.w-12,obs.y+9,4,5);
            }
            // player jet
            ctx.fillStyle="#FFAA44cc";
            ctx.beginPath(); ctx.moveTo(skyPlayerX+18,CANVAS_H-70+28); ctx.lineTo(skyPlayerX+6,CANVAS_H-70+42); ctx.lineTo(skyPlayerX+18,CANVAS_H-70+34); ctx.lineTo(skyPlayerX+30,CANVAS_H-70+42); ctx.fill();
            ctx.fillStyle="#4FC3F7";
            ctx.beginPath(); ctx.roundRect(skyPlayerX,CANVAS_H-70,SKY_PLAYER_W,SKY_PLAYER_H,10); ctx.fill();
            ctx.fillStyle="#C0E0FF";
            ctx.beginPath(); ctx.ellipse(skyPlayerX+18,CANVAS_H-70+12,11,9,0,0,Math.PI*2); ctx.fill();
            ctx.fillStyle="#101820"; ctx.fillRect(skyPlayerX+14,CANVAS_H-70+10,8,5);
        }
        
        // --------------------------------------------------------------
        // 2) FROGGER FRENZY (Crossy Road knockoff: identical lanes)
        // --------------------------------------------------------------
        // Grid system: 50px tile size, 16 columns x 10 rows approx (800/50=16, 500/50=10)
        const TILE = 50;
        const COLS = 16, ROWS = 10;
        let frogX = 7, frogY = 8;   // start near bottom (y index 8 = 9th row)
        let crossyObstacles = [];    // {x, y, type, dir, speed}
        let crossyFrame = 0;
        let crossySpawnCounter = 0;
        let lanes = [];    // store lane data: y row (index), direction, speed, pattern
        
        function initLanes() {
            // lanes: row indices 1 to 6 (active roads), row 0 top grass, row 7 start grass, row 8-9 safe
            // Classic crossy: cars move left/right
            lanes = [
                {row:1, dir:-1, speed:1.5, color:"#6a4e2e"},   // left
                {row:2, dir:1, speed:1.8, color:"#5a6e4a"},
                {row:3, dir:-1, speed:2.2, color:"#8b5a2b"},
                {row:4, dir:1, speed:2.6, color:"#4a6e3a"},
                {row:5, dir:-1, speed:3.0, color:"#95734a"},
                {row:6, dir:1, speed:3.4, color:"#6b4e2a"}
            ];
        }
        
        function resetCrossyFrenzy() {
            frogX = 7; frogY = 8;
            crossyObstacles = [];
            crossyFrame = 0;
            crossySpawnCounter = 0;
            initLanes();
            // pre-spawn obstacles on each lane to look busy
            for(let L of lanes) {
                for(let i=0;i<4;i++) {
                    let randX = Math.random() * (CANVAS_W - TILE);
                    crossyObstacles.push({
                        x: randX, y: L.row * TILE, w: TILE-4, h: TILE-6,
                        dir: L.dir, speed: L.speed,
                        laneRow: L.row
                    });
                }
            }
        }
        
        function updateCrossy() {
            if(!gameRunning) return;
            // move existing obstacles
            for(let obs of crossyObstacles) {
                obs.x += obs.dir * obs.speed;
                // wrap around
                if(obs.x > CANVAS_W) obs.x = -obs.w;
                if(obs.x + obs.w < 0) obs.x = CANVAS_W;
            }
            // spawn new obstacles occasionally (to keep density)
            if(Math.random()<0.02 && crossyObstacles.length<40) {
                let laneChoice = lanes[Math.floor(Math.random()*lanes.length)];
                let startX = laneChoice.dir === 1 ? -TILE : CANVAS_W;
                crossyObstacles.push({
                    x: startX, y: laneChoice.row * TILE, w: TILE-4, h: TILE-6,
                    dir: laneChoice.dir, speed: laneChoice.speed,
                    laneRow: laneChoice.row
                });
            }
            
            // COLLISION: frog vs obstacles on same row
            let frogRect = {x: frogX*TILE, y: frogY*TILE, w: TILE-6, h: TILE-8};
            for(let obs of crossyObstacles) {
                if(obs.laneRow === frogY) {
                    let obsRect = {x: obs.x, y: obs.y, w: obs.w, h: obs.h};
                    if(frogRect.x < obsRect.x+obsRect.w && frogRect.x+frogRect.w > obsRect.x &&
                       frogRect.y < obsRect.y+obsRect.h && frogRect.y+frogRect.h > obsRect.y) {
                        gameRunning = false;
                        saveHigh();
                        return;
                    }
                }
            }
            
            // Check if frog reached top (row 0)
            if(frogY === 0) {
                // score big and reset frog position, increase score
                score += 100;
                frogX = 7; frogY = 8;
                updateUI();
                saveHigh();
                // also increase difficulty slightly: speeds increment
                for(let L of lanes) {
                    L.speed += 0.12;
                }
            }
            // bounds: frog within canvas columns
            if(frogX<0) frogX=0;
            if(frogX>=COLS) frogX=COLS-1;
            if(frogY<0) frogY=0;
            if(frogY>=ROWS) frogY=ROWS-1;
            
            // passive score for surviving
            score += 0.07;
            updateUI();
            if(Math.floor(score) > highScore) { highScore = Math.floor(score); updateUI(); saveHigh();}
        }
        
        function drawCrossy() {
            // grass background with road stripes
            for(let row=0; row<ROWS; row++) {
                let isRoad = lanes.some(l => l.row === row);
                if(isRoad) {
                    ctx.fillStyle = "#3c5e2b";
                    ctx.fillRect(0, row*TILE, CANVAS_W, TILE);
                    ctx.fillStyle = "#f5e6a0";
                    for(let i=0;i<10;i++) {
                        ctx.fillRect(i*80 + (Date.now()*0.01)%80, row*TILE+22, 35, 6);
                    }
                } else {
                    let grad = ctx.createLinearGradient(0,row*TILE,0,row*TILE+TILE);
                    grad.addColorStop(0,"#5b8c50");
                    grad.addColorStop(1,"#3f6840");
                    ctx.fillStyle=grad;
                    ctx.fillRect(0, row*TILE, CANVAS_W, TILE);
                    // grass details
                    ctx.fillStyle = "#b9d48b";
                    for(let i=0;i<12;i++) ctx.fillRect(i*67+10, row*TILE+12, 4, 8);
                }
            }
            // draw moving obstacles (cars , logs style)
            for(let obs of crossyObstacles) {
                ctx.shadowBlur=0;
                ctx.fillStyle = "#c94f2c";
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                ctx.fillStyle = "#f2c55e";
                ctx.fillRect(obs.x+5, obs.y+8, obs.w-10, 10);
                ctx.fillStyle = "#2e1f0a";
                ctx.fillRect(obs.x+12, obs.y+20, 8, 8);
                // wheels
                ctx.fillStyle = "#000";
                ctx.fillRect(obs.x+4, obs.y+obs.h-8, 8, 6);
                ctx.fillRect(obs.x+obs.w-12, obs.y+obs.h-8, 8, 6);
            }
            // Draw frog (cute amphibian)
            let fx = frogX*TILE, fy = frogY*TILE;
            ctx.fillStyle = "#56b349";
            ctx.beginPath(); ctx.ellipse(fx+TILE/2, fy+TILE/2-4, 16, 14, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#b3ffa7";
            ctx.beginPath(); ctx.ellipse(fx+TILE/2-5, fy+TILE/2-8, 4, 5, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(fx+TILE/2+5, fy+TILE/2-8, 4, 5, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle="#000";
            ctx.fillRect(fx+TILE/2-7, fy+TILE/2-6, 3, 3);
            ctx.fillRect(fx+TILE/2+4, fy+TILE/2-6, 3, 3);
            // smile
            ctx.beginPath(); ctx.arc(fx+TILE/2, fy+TILE/2-1, 8, 0.05, Math.PI-0.05); ctx.stroke();
            // legs
            ctx.fillStyle="#3f8a32";
            ctx.fillRect(fx+4, fy+TILE-12, 10, 6);
            ctx.fillRect(fx+TILE-14, fy+TILE-12, 10, 6);
            // win particles if top row reached: drawn after
            if(frogY===0) {
                ctx.font="bold 24px monospace"; ctx.fillStyle="#FFD966"; ctx.shadowBlur=6;
                ctx.fillText("+100!", fx+10, fy-8);
            }
        }
        
        // --------------------------------------------------------------
        // Input handler (mouse + touch unified) for both games
        // --------------------------------------------------------------
        let targetX = CANVAS_W/2;
        let activeTouchId = null;
        
        function getCanvasRelativeX(clientX) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            let val = (clientX - rect.left) * scaleX;
            return Math.min(Math.max(val, 0), CANVAS_W);
        }
        
        function handleMove(clientX) {
            let rawX = getCanvasRelativeX(clientX);
            if(currentGame === "SKYRUSH") {
                let newX = rawX - SKY_PLAYER_W/2;
                newX = Math.min(Math.max(newX, 0), CANVAS_W - SKY_PLAYER_W);
                skyPlayerX = newX;
            } 
            else if (currentGame === "CROSSY") {
                // we use horizontal swipes: but we only map left/right relative moves
                // Better to convert into relative cell shift? classic Crossy uses 1 tile per swipe.
                // For smooth mouse/touch, we do "drag to move cell" with delta.
                // Simpler but feel identical: treat mouse coordinate to snap cell?
                // For authentic identical knockoff, we implement "mouse relative cell" but we also keep keys virtual: 
                // To feel perfect: we'll use relative position to change columns.
                let targetCol = Math.floor(rawX / TILE);
                if(targetCol !== frogX && gameRunning) {
                    frogX = targetCol;
                    if(frogX<0) frogX=0;
                    if(frogX>=COLS) frogX=COLS-1;
                }
            }
        }
        
        function onMouseMove(e) { if(gameRunning) { handleMove(e.clientX); e.preventDefault();} }
        function onTouchStart(e) { e.preventDefault(); if(!gameRunning) return; const t=e.touches[0]; if(t){ activeTouchId=t.identifier; handleMove(t.clientX);} }
        function onTouchMove(e) { e.preventDefault(); if(!gameRunning) return; let found=null; if(activeTouchId!==null){ for(let i=0;i<e.touches.length;i++) if(e.touches[i].identifier===activeTouchId){ found=e.touches[i]; break;}} if(!found && e.touches.length) found=e.touches[0]; if(found) handleMove(found.clientX);}
        function onTouchEnd(e){ e.preventDefault(); activeTouchId=null; }
        
        canvas.addEventListener('mousemove', onMouseMove);
        canvas.addEventListener('touchstart', onTouchStart, {passive:false});
        canvas.addEventListener('touchmove', onTouchMove, {passive:false});
        canvas.addEventListener('touchend', onTouchEnd);
        canvas.addEventListener('touchcancel', onTouchEnd);
        canvas.addEventListener('contextmenu', e=>e.preventDefault());
        
        // Also support keyboard for PC (arrow keys for crossy moves)
        window.addEventListener('keydown', (e) => {
            if(!gameRunning) return;
            if(currentGame === "CROSSY") {
                if(e.key === 'ArrowLeft') { frogX--; if(frogX<0) frogX=0; e.preventDefault();}
                else if(e.key === 'ArrowRight') { frogX++; if(frogX>=COLS) frogX=COLS-1; e.preventDefault();}
                else if(e.key === 'ArrowUp') { frogY--; if(frogY<0) frogY=0; e.preventDefault();}
                else if(e.key === 'ArrowDown') { frogY++; if(frogY>=ROWS) frogY=ROWS-1; e.preventDefault();}
            } else if(currentGame === "SKYRUSH") {
                if(e.key === 'ArrowLeft') { skyPlayerX -= 32; if(skyPlayerX<0) skyPlayerX=0; e.preventDefault();}
                if(e.key === 'ArrowRight') { skyPlayerX += 32; if(skyPlayerX+SKY_PLAYER_W>CANVAS_W) skyPlayerX=CANVAS_W-SKY_PLAYER_W; e.preventDefault();}
            }
        });
        
        // --------------------------------------------------------------
        // Game switching & reset logic
        // --------------------------------------------------------------
        function resetCurrentGame() {
            gameRunning = true;
            if(currentGame === "SKYRUSH") {
                resetSkyRush();
                score = 0;
                updateUI();
            } else if(currentGame === "CROSSY") {
                resetCrossyFrenzy();
                score = 0;
                updateUI();
            }
        }
        
        function switchGame(gameId) {
            currentGame = gameId;
            resetCurrentGame();
            gameRunning = true;
            // update controls text
            if(currentGame === "SKYRUSH") controlsMsgDiv.innerText = "✈️ SKY RUSH: MOVE MOUSE / DRAG LEFT-RIGHT | Arrow keys / Dodge red blocks!";
            else controlsMsgDiv.innerText = "🐸 FROGGER FRENZY: MOVE MOUSE (SWIPE LEFT/RIGHT) or Arrow keys | Reach TOP lane +100!";
        }
        
        // buttons & restart
        document.getElementById('btnSkyRush').addEventListener('click',()=>{ switchGame("SKYRUSH"); });
        document.getElementById('btnCrossy').addEventListener('click',()=>{ switchGame("CROSSY"); });
        document.getElementById('globalRestartBtn').addEventListener('click',()=>{ resetCurrentGame(); gameRunning=true; });
        
        // initial setup
        initLanes();
        resetCrossyFrenzy();
        resetSkyRush();
        updateUI();
        
        // main loop
        function gameLoop() {
            if(gameRunning) {
                if(currentGame === "SKYRUSH") updateSkyRush();
                else updateCrossy();
            }
            // DRAW
            if(currentGame === "SKYRUSH") drawSkyRush();
            else drawCrossy();
            
            if(!gameRunning) {
                ctx.fillStyle = "#000000aa";
                ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
                ctx.font = "bold 28px monospace";
                ctx.fillStyle = "#FFD966";
                ctx.textAlign = "center";
                ctx.fillText("💀 GAME OVER 💀", CANVAS_W/2, CANVAS_H/2-25);
                ctx.font = "18px monospace";
                ctx.fillStyle = "#FFF2B5";
                ctx.fillText("tap RESTART or switch game", CANVAS_W/2, CANVAS_H/2+40);
            }
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    })();
</script>
</body>
</html>
