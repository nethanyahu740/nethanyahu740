    const fullGameList = [...gamesData, ...extraGames];
    
    let currentFilter = "all";
    let currentSearch = "";
    
    function filterGames() {
        return fullGameList.filter(game => {
            const matchesSearch = game.title.toLowerCase().includes(currentSearch.toLowerCase()) || 
                                 game.tags.toLowerCase().includes(currentSearch.toLowerCase());
            if (!matchesSearch) return false;
            if (currentFilter === "all") return true;
            if (currentFilter === "1-player") return game.tags.includes("1-player") || game.tags.includes("1p");
            if (currentFilter === "2-player") return game.tags.includes("2-player") || game.tags.includes("2p");
            if (currentFilter === "multiplayer") return game.tags.includes("multiplayer") || game.tags.includes("io");
            return true;
        });
    }
    
    function renderGames() {
        const filtered = filterGames();
        const grid = document.getElementById("gamesGrid");
        const stats = document.getElementById("statsDisplay");
        stats.innerText = `🎮 ${filtered.length} games available • tap to play fullscreen`;
        
        if (filtered.length === 0) {
            grid.innerHTML = '<div class="no-results">😔 No games found. Try a different search!</div>';
            return;
        }
        
        grid.innerHTML = filtered.map((game, idx) => `
            <div class="game-card" data-url="${game.embed}" data-title="${game.title}" style="animation-delay: ${idx * 0.01}s">
                <img class="game-img" src="${game.image}" alt="${game.title}" onerror="this.src='https://placehold.co/200x130/4a2c6e/white?text=${encodeURIComponent(game.title.slice(0,12))}'">
                <div class="game-info">
                    <div class="game-title">${game.title}</div>
                    <div class="game-tags">${game.tags.split(',')[0]} • ${game.tags.split(',')[1] || 'game'}</div>
                </div>
            </div>
        `).join('');
        
        // attach click handlers
        document.querySelectorAll('.game-card').forEach(card => {
            card.addEventListener('click', (e) => {
                const url = card.dataset.url;
                if (url) openFullscreen(url);
            });
        });
    }
    
    // Fullscreen handler (iOS friendly)
    function openFullscreen(url) {
        if (document.querySelector('.fullscreen-overlay')) return;
        const overlay = document.createElement('div');
        overlay.className = 'fullscreen-overlay';
        const iframe = document.createElement('iframe');
        iframe.src = url;
        iframe.className = 'fullscreen-iframe';
        iframe.setAttribute('allowfullscreen', 'true');
        iframe.setAttribute('allow', 'autoplay; fullscreen; clipboard-write; accelerometer');
        const closeBtn = document.createElement('button');
        closeBtn.innerText = '✕ CLOSE GAME';
        closeBtn.className = 'close-btn';
        overlay.appendChild(iframe);
        overlay.appendChild(closeBtn);
        document.body.appendChild(overlay);
        document.body.style.overflow = 'hidden';
        const closeFullscreen = () => {
            overlay.remove();
            document.body.style.overflow = '';
        };
        closeBtn.onclick = closeFullscreen;
        overlay.onclick = (e) => { if (e.target === overlay) closeFullscreen(); };
        document.addEventListener('keydown', function escHandler(e) {
            if (e.key === 'Escape') { closeFullscreen(); document.removeEventListener('keydown', escHandler); }
        });
    }
    
    // search and filter event handlers
    document.getElementById('searchInput').addEventListener('input', (e) => {
        currentSearch = e.target.value;
        renderGames();
    });
    document.getElementById('filterAll').addEventListener('click', () => { currentFilter = "all"; updateActiveButton('filterAll'); renderGames(); });
    document.getElementById('filter1p').addEventListener('click', () => { currentFilter = "1-player"; updateActiveButton('filter1p'); renderGames(); });
    document.getElementById('filter2p').addEventListener('click', () => { currentFilter = "2-player"; updateActiveButton('filter2p'); renderGames(); });
    document.getElementById('filterMulti').addEventListener('click', () => { currentFilter = "multiplayer"; updateActiveButton('filterMulti'); renderGames(); });
    
    function updateActiveButton(activeId) {
        ['filterAll', 'filter1p', 'filter2p', 'filterMulti'].forEach(id => {
            const btn = document.getElementById(id);
            if (id === activeId) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }
    
    renderGames();
</script>
</body>
</html>
