<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Crossy Road Clone - Frogger Style 3D Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Press Start 2P', 'Courier New', monospace;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        #score {
            position: absolute;
            top: 20px;
            right: 20px;
            color: gold;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
            font-family: monospace;
            letter-spacing: 2px;
            backdrop-filter: blur(5px);
            border: 1px solid gold;
        }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: red;
            background: black;
            padding: 30px 50px;
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            z-index: 20;
            display: none;
            border: 3px solid red;
            border-radius: 20px;
            white-space: nowrap;
            font-family: monospace;
            backdrop-filter: blur(8px);
            background: rgba(0,0,0,0.85);
            pointer-events: none;
        }
        #restart-btn {
            margin-top: 20px;
            font-size: 24px;
            background: gold;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
            border-radius: 10px;
            pointer-events: auto;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }
        @media (max-width: 600px) {
            #score { font-size: 18px; top: 10px; right: 10px; }
            #info { font-size: 10px; top: 10px; left: 10px; }
            #game-over { font-size: 28px; padding: 20px 30px; white-space: normal; width: 80%; }
            #restart-btn { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div id="info">🐸 CROSSY ROAD CLONE | Avoid Cars & Trucks | Reach Top</div>
    <div id="score">SCORE: 0</div>
    <div id="game-over">
        GAME OVER<br>
        <button id="restart-btn">RESTART</button>
    </div>
    <div id="controls">⬆️ ⬇️ ⬅️ ➡️  or  WASD</div>

    <!-- Import Three.js core and add-ons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Setup Scene, Camera, Renderers ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a4c2a); // forest green
        scene.fog = new THREE.Fog(0x0a4c2a, 30, 50);

        // Camera: Top-down angled isometric style
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(12, 10, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // shadows add depth
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // CSS2 Renderer for simple text labels
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // --- Lights ---
        // Ambient
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        // Directional Light (sun)
        const dirLight = new THREE.DirectionalLight(0xfff5d1, 1.2);
        dirLight.position.set(10, 20, 5);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 30;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        scene.add(dirLight);
        // Fill light from below
        const fillLight = new THREE.PointLight(0x4466cc, 0.3);
        fillLight.position.set(0, -5, 0);
        scene.add(fillLight);
        // Rim light
        const rimLight = new THREE.PointLight(0xffaa66, 0.5);
        rimLight.position.set(-5, 8, -6);
        scene.add(rimLight);

        // --- Ground Grid (retro feel) ---
        const gridHelper = new THREE.GridHelper(30, 20, 0x88aa88, 0x446644);
        gridHelper.position.y = -0.5;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.4;
        scene.add(gridHelper);
        
        // Base ground plane (invisible but catches shadows)
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(25, 25),
            new THREE.ShadowMaterial({ opacity: 0.4, color: 0x000000, transparent: true, side: THREE.DoubleSide })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.6;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);

        // --- Define Road Lanes (Y positions, direction, speed, type) ---
        // Lanes from bottom (negative Z) to top (positive Z)
        // player starts at Z = -5, goal at Z = 7
        const lanes = [
            { y: -4.0, direction: 1, speed: 2.2, type: 'car', color: 0xcc3333, width: 1.2 },   // red car
            { y: -2.5, direction: -1, speed: 2.5, type: 'truck', color: 0x886622, width: 2.0 }, // truck
            { y: -1.0, direction: 1, speed: 2.0, type: 'car', color: 0x33cc33, width: 1.2 },
            { y: 0.5, direction: -1, speed: 2.8, type: 'car', color: 0x3399ff, width: 1.2 },
            { y: 2.0, direction: 1, speed: 2.3, type: 'truck', color: 0xaa6644, width: 2.0 },
            { y: 3.5, direction: -1, speed: 3.0, type: 'car', color: 0xffaa33, width: 1.2 },
            { y: 5.0, direction: 1, speed: 2.7, type: 'car', color: 0xdd44aa, width: 1.2 },
            { y: 6.5, direction: -1, speed: 2.4, type: 'truck', color: 0x8b5a2b, width: 2.0 }
        ];
        
        // Store moving vehicles: each { mesh, laneIndex, offsetX, width, speed, direction }
        const vehicles = [];
        
        // Road markings: add white dashed lines on each lane
        lanes.forEach((lane, idx) => {
            const lineMat = new THREE.MeshStandardMaterial({ color: 0xffdd99, emissive: 0x442200 });
            for (let x = -12; x <= 12; x += 2.5) {
                const dash = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.1, 0.8), lineMat);
                dash.position.set(x, lane.y - 0.2, 0);
                dash.castShadow = false;
                dash.receiveShadow = false;
                scene.add(dash);
            }
            // lane borders
            const borderMat = new THREE.MeshStandardMaterial({ color: 0xccaa77 });
            const leftBorder = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 7.5), borderMat);
            leftBorder.position.set(-5.8, lane.y - 0.15, 0);
            const rightBorder = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 7.5), borderMat);
            rightBorder.position.set(5.8, lane.y - 0.15, 0);
            scene.add(leftBorder);
            scene.add(rightBorder);
        });
        
        // --- Create Vehicles function ---
        function createVehicle(type, color, widthVal) {
            const group = new THREE.Group();
            let bodyGeo, cabinGeo;
            if (type === 'truck') {
                bodyGeo = new THREE.BoxGeometry(widthVal, 0.6, 1.4);
                const bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.4, metalness: 0.7 });
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                body.castShadow = true;
                body.receiveShadow = true;
                body.position.y = 0;
                group.add(body);
                // cabin
                cabinGeo = new THREE.BoxGeometry(0.9, 0.7, 1.2);
                const cabinMat = new THREE.MeshStandardMaterial({ color: 0x4466aa, roughness: 0.2 });
                const cabin = new THREE.Mesh(cabinGeo, cabinMat);
                cabin.position.x = -widthVal/2 + 0.5;
                cabin.position.y = 0.35;
                cabin.castShadow = true;
                group.add(cabin);
                // wheels (black cylinders)
                const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.5 });
                const wheelGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.3, 12);
                const positions = [[-0.7, -0.2, 0.6], [0.7, -0.2, 0.6], [-0.7, -0.2, -0.6], [0.7, -0.2, -0.6]];
                positions.forEach(pos => {
                    const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                    wheel.rotation.z = Math.PI/2;
                    wheel.position.set(pos[0], pos[1], pos[2]);
                    wheel.castShadow = true;
                    group.add(wheel);
                });
            } else { // car
                bodyGeo = new THREE.BoxGeometry(widthVal, 0.4, 1.2);
                const bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3, metalness: 0.6 });
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                body.castShadow = true;
                group.add(body);
                const roofGeo = new THREE.BoxGeometry(widthVal*0.7, 0.3, 0.9);
                const roofMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
                const roof = new THREE.Mesh(roofGeo, roofMat);
                roof.position.y = 0.35;
                roof.castShadow = true;
                group.add(roof);
                const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.7 });
                const wheelGeo = new THREE.CylinderGeometry(0.22, 0.22, 0.25, 12);
                const pos = [[-0.6, -0.1, 0.55], [0.6, -0.1, 0.55], [-0.6, -0.1, -0.55], [0.6, -0.1, -0.55]];
                pos.forEach(p => {
                    const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                    wheel.rotation.z = Math.PI/2;
                    wheel.position.set(p[0], p[1], p[2]);
                    wheel.castShadow = true;
                    group.add(wheel);
                });
            }
            return group;
        }
        
        // Populate lanes with vehicles at random offsets
        lanes.forEach((lane, idx) => {
            const numVehicles = 5; // per lane, enough for continuous flow
            for (let i = 0; i < numVehicles; i++) {
                const vehicleGroup = createVehicle(lane.type, lane.color, lane.width);
                const startX = (i / numVehicles) * 24 - 12; // spread across -12 to 12
                vehicleGroup.position.x = startX;
                vehicleGroup.position.z = lane.y;
                vehicleGroup.position.y = 0.1;
                scene.add(vehicleGroup);
                vehicles.push({
                    mesh: vehicleGroup,
                    laneIndex: idx,
                    offsetX: startX,
                    width: lane.width,
                    speed: lane.speed,
                    direction: lane.direction,
                    laneY: lane.y
                });
            }
        });
        
        // --- Player (Frog / Chicken character) ---
        const playerGroup = new THREE.Group();
        // Body
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x7ec850, emissive: 0x226622, roughness: 0.2 });
        const bodyGeo = new THREE.SphereGeometry(0.5, 24, 24);
        const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
        bodyMesh.scale.set(1.2, 0.7, 0.9);
        bodyMesh.position.y = 0;
        bodyMesh.castShadow = true;
        playerGroup.add(bodyMesh);
        // Eyes
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.18, 24, 24), eyeMat);
        leftEye.position.set(-0.35, 0.35, 0.55);
        leftEye.castShadow = true;
        const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.18, 24, 24), eyeMat);
        rightEye.position.set(0.35, 0.35, 0.55);
        rightEye.castShadow = true;
        playerGroup.add(leftEye);
        playerGroup.add(rightEye);
        // Pupils
        const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
        const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.1, 24, 24), pupilMat);
        leftPupil.position.set(-0.35, 0.3, 0.72);
        const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.1, 24, 24), pupilMat);
        rightPupil.position.set(0.35, 0.3, 0.72);
        playerGroup.add(leftPupil);
        playerGroup.add(rightPupil);
        // Hat / crest
        const hatMat = new THREE.MeshStandardMaterial({ color: 0xdd4422 });
        const hat = new THREE.Mesh(new THREE.ConeGeometry(0.45, 0.5, 8), hatMat);
        hat.position.y = 0.55;
        hat.castShadow = true;
        playerGroup.add(hat);
        
        playerGroup.position.set(0, 0.1, -5); // start at bottom lane area
        playerGroup.castShadow = true;
        scene.add(playerGroup);
        
        // --- Goal Area (tree at top) ---
        const goalTreeGroup = new THREE.Group();
        const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 0.8, 6), trunkMat);
        trunk.position.y = 0;
        trunk.castShadow = true;
        goalTreeGroup.add(trunk);
        const foliageMat = new THREE.MeshStandardMaterial({ color: 0x3c9e3c });
        const foliage1 = new THREE.Mesh(new THREE.ConeGeometry(0.7, 0.8, 8), foliageMat);
        foliage1.position.y = 0.6;
        foliage1.castShadow = true;
        const foliage2 = new THREE.Mesh(new THREE.ConeGeometry(0.55, 0.6, 8), foliageMat);
        foliage2.position.y = 1.0;
        foliage2.castShadow = true;
        goalTreeGroup.add(foliage1);
        goalTreeGroup.add(foliage2);
        goalTreeGroup.position.set(0, 0, 7.2);
        scene.add(goalTreeGroup);
        
        // Sparkle effect for goal (small particles)
        const sparkleGeo = new THREE.BufferGeometry();
        const sparkleCount = 80;
        const sparklePositions = new Float32Array(sparkleCount * 3);
        for (let i = 0; i < sparkleCount; i++) {
            sparklePositions[i*3] = (Math.random() - 0.5) * 4;
            sparklePositions[i*3+1] = Math.random() * 1.5;
            sparklePositions[i*3+2] = 7 + (Math.random() - 0.5) * 2;
        }
        sparkleGeo.setAttribute('position', new THREE.BufferAttribute(sparklePositions, 3));
        const sparkleMat = new THREE.PointsMaterial({ color: 0xffdd77, size: 0.08 });
        const sparkles = new THREE.Points(sparkleGeo, sparkleMat);
        scene.add(sparkles);
        
        // --- game state ---
        let score = 0;
        let gameActive = true;
        let lastTimestamp = 0;
        let moveCooldown = false;
        let playerPos = { x: 0, z: -5 };
        const step = 1.0; // grid move distance
        const minX = -5.5;
        const maxX = 5.5;
        const minZ = -5;
        const maxZ = 7;
        
        function updateScoreUI() {
            document.getElementById('score').innerText = `SCORE: ${score}`;
        }
        
        // Collision detection (AABB)
        function checkCollision() {
            const playerBox = new THREE.Box3().setFromObject(playerGroup);
            for (let v of vehicles) {
                const vehicleBox = new THREE.Box3().setFromObject(v.mesh);
                if (playerBox.intersectsBox(vehicleBox)) {
                    return true;
                }
            }
            return false;
        }
        
        function checkGoal() {
            // if player reaches the tree zone (z >= 6.8)
            if (playerPos.z >= maxZ - 0.2) {
                score++;
                updateScoreUI();
                // reset player to start
                playerPos.x = 0;
                playerPos.z = minZ;
                updatePlayerPosition();
                // play success effect: flash and reposition tree sparkle
                document.body.style.backgroundColor = '#aaffaa';
                setTimeout(() => { document.body.style.backgroundColor = ''; }, 150);
                // also reset all vehicles positions randomly to keep fresh
                resetVehiclesPositions();
                return true;
            }
            return false;
        }
        
        function resetVehiclesPositions() {
            vehicles.forEach(v => {
                // random offset between -12 and 12
                const newX = (Math.random() * 24) - 12;
                v.mesh.position.x = newX;
                v.offsetX = newX;
            });
        }
        
        function updatePlayerPosition() {
            playerGroup.position.x = playerPos.x;
            playerGroup.position.z = playerPos.z;
            // slight hop animation?
            playerGroup.position.y = 0.1 + Math.sin(Date.now() * 0.015) * 0.02;
        }
        
        function movePlayer(dx, dz) {
            if (!gameActive) return;
            let newX = playerPos.x + dx * step;
            let newZ = playerPos.z + dz * step;
            if (newX < minX) newX = minX;
            if (newX > maxX) newX = maxX;
            if (newZ < minZ) newZ = minZ;
            if (newZ > maxZ) newZ = maxZ;
            playerPos.x = newX;
            playerPos.z = newZ;
            updatePlayerPosition();
            
            // After move, check goal first to prevent death on same frame
            if (checkGoal()) return;
            
            if (checkCollision()) {
                gameActive = false;
                document.getElementById('game-over').style.display = 'block';
            }
        }
        
        // --- keyboard input ---
        const keyState = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, s: false, a: false, d: false };
        let lastMoveTime = 0;
        const moveDelay = 180; // ms between moves for smooth grid movement
        
        function handleInput() {
            if (!gameActive) return;
            const now = Date.now();
            if (now - lastMoveTime < moveDelay) return;
            let dx = 0, dz = 0;
            if (keyState.ArrowUp || keyState.w) dz = 1;
            else if (keyState.ArrowDown || keyState.s) dz = -1;
            else if (keyState.ArrowLeft || keyState.a) dx = -1;
            else if (keyState.ArrowRight || keyState.d) dx = 1;
            if (dx !== 0 || dz !== 0) {
                movePlayer(dx, dz);
                lastMoveTime = now;
                // play little sound effect vibe? just visual hop
                playerGroup.position.y = 0.3;
                setTimeout(() => { if(gameActive) playerGroup.position.y = 0.1; }, 100);
            }
        }
        
        window.addEventListener('keydown', (e) => {
            const key = e.key;
            if (keyState.hasOwnProperty(key)) keyState[key] = true;
            // prevent page scroll
            if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','s','a','d'].includes(key)) e.preventDefault();
        });
        window.addEventListener('keyup', (e) => {
            const key = e.key;
            if (keyState.hasOwnProperty(key)) keyState[key] = false;
        });
        
        // Restart logic
        document.getElementById('restart-btn').addEventListener('click', () => {
            gameActive = true;
            score = 0;
            updateScoreUI();
            playerPos.x = 0;
            playerPos.z = minZ;
            updatePlayerPosition();
            document.getElementById('game-over').style.display = 'none';
            resetVehiclesPositions();
            // ensure no collision right after restart
            setTimeout(() => {
                if (checkCollision()) {
                    // if somehow collision, slight reposition
                    playerPos.x = 0;
                    playerPos.z = minZ;
                    updatePlayerPosition();
                }
            }, 50);
        });
        
        // --- animate vehicles movement (continuous) ---
        let lastFrameTime = performance.now();
        function updateVehicles(deltaTime) {
            if (!gameActive) return;
            const speedFactor = deltaTime * 3.5; // ~60fps -> 0.016 * 3.5 = 0.056 per frame ~ proper speed
            vehicles.forEach(v => {
                let move = v.speed * v.direction * speedFactor;
                let newX = v.mesh.position.x + move;
                // wrap around: if goes beyond -12 to 12 range, teleport to other side
                if (newX > 13) newX = -13;
                if (newX < -13) newX = 13;
                v.mesh.position.x = newX;
                v.offsetX = newX;
            });
        }
        
        // Simple camera follow/ slight rotation for better view
        let timeAcc = 0;
        
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastFrameTime) / 1000);
            lastFrameTime = now;
            if (delta < 0.005) delta = 0.016;
            
            if (gameActive) {
                updateVehicles(delta);
                handleInput();
                // additional collision check during vehicle movement (real-time)
                if (checkCollision() && gameActive) {
                    gameActive = false;
                    document.getElementById('game-over').style.display = 'block';
                }
                // dynamic player bounce
                playerGroup.position.y = 0.1 + Math.sin(Date.now() * 0.012) * 0.03;
                // rotate sparkles
                sparkles.rotation.y += 0.01;
            } else {
                // game over effect - sad tilt
                playerGroup.rotation.z = Math.sin(Date.now() * 0.01) * 0.1;
            }
            
            // Slight camera movement and target
            const targetZ = Math.max(-5, Math.min(7, playerPos.z));
            const targetX = playerPos.x * 0.2;
            camera.position.x += (targetX - camera.position.x) * 0.05;
            camera.position.z = 12 + (targetZ * 0.05);
            camera.lookAt(playerPos.x, 0, playerPos.z);
            
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        // --- Add decorative trees / bushes on sides ---
        const bushMat = new THREE.MeshStandardMaterial({ color: 0x5a9e4e });
        for (let i = -6; i <= 6; i+=1.5) {
            if (Math.abs(i) < 5) continue;
            const bush = new THREE.Mesh(new THREE.SphereGeometry(0.4, 6), bushMat);
            bush.position.set(i, -0.2, -4.5);
            bush.castShadow = true;
            scene.add(bush);
            const bush2 = new THREE.Mesh(new THREE.SphereGeometry(0.4, 6), bushMat);
            bush2.position.set(i, -0.2, 6.5);
            bush2.castShadow = true;
            scene.add(bush2);
        }
        
        // Add roadside trees
        const treeTrunkMat = new THREE.MeshStandardMaterial({ color: 0xaa7c4a });
        for (let side = -1; side <= 1; side+=2) {
            for (let z = -4; z <= 7; z+=2.5) {
                if (z > -3 && z < 6) continue;
                const trunkTree = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 0.6, 5), treeTrunkMat);
                trunkTree.position.set(side * 6.2, -0.2, z);
                trunkTree.castShadow = true;
                const foliageTree = new THREE.Mesh(new THREE.ConeGeometry(0.5, 0.6, 6), new THREE.MeshStandardMaterial({ color: 0x4caf4c }));
                foliageTree.position.set(side * 6.2, 0.25, z);
                foliageTree.castShadow = true;
                scene.add(trunkTree);
                scene.add(foliageTree);
            }
        }
        
        // Initialize score and start
        updateScoreUI();
        updatePlayerPosition();
        animate();
